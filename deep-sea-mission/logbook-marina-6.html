<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Captain Marina Logbook - Entry 6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0a2540 0%, #041325 55%, #000810 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #d6f3ff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Bubbles */
  .bubble {
    position: fixed;
    bottom: -50px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(120,220,255,0.55), rgba(120,220,255,0.05));
    animation: rise linear infinite;
    pointer-events: none;
  }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
  }

  /* Sonar rings */
  .sonar-wrap {
    position: absolute;
    top: 50%; left: 50%;
    width: 10px; height: 10px;
    pointer-events: none;
  }
  .sonar-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 40px; height: 40px;
    margin: -20px 0 0 -20px;
    border: 1px solid rgba(80,220,255,0.35);
    border-radius: 50%;
    animation: ping 4s ease-out infinite;
  }
  .sonar-ring:nth-child(2) { animation-delay: 1.3s; }
  .sonar-ring:nth-child(3) { animation-delay: 2.6s; }
  @keyframes ping {
    0% { width: 40px; height: 40px; margin: -20px 0 0 -20px; opacity: 0.7; }
    100% { width: 900px; height: 900px; margin: -450px 0 0 -450px; opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    margin: 24px;
    padding: 36px 28px 40px;
    background: linear-gradient(160deg, rgba(8,40,68,0.92), rgba(3,18,34,0.96));
    border: 1px solid rgba(90,220,255,0.35);
    border-radius: 22px;
    box-shadow: 0 0 0 1px rgba(90,220,255,0.08), 0 25px 60px rgba(0,0,0,0.55), 0 0 70px rgba(40,170,255,0.15) inset;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7fd8ff;
    background: rgba(80,220,255,0.08);
    border: 1px solid rgba(90,220,255,0.3);
    border-radius: 999px;
    padding: 6px 14px;
    margin-bottom: 18px;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #5fffb0;
    box-shadow: 0 0 8px #5fffb0;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #eafcff;
    text-shadow: 0 0 18px rgba(80,200,255,0.5);
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 14.5px;
    line-height: 1.5;
    color: #9fd4ec;
    margin-bottom: 30px;
  }

  .sub-icon {
    font-size: 54px;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 18px rgba(80,200,255,0.55));
  }

  .play-btn {
    appearance: none;
    border: none;
    cursor: pointer;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #5fe3ff, #0d8fc9 60%, #075d85);
    box-shadow: 0 0 0 6px rgba(95,227,255,0.12), 0 10px 30px rgba(0,140,200,0.5), 0 0 40px rgba(95,227,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .play-btn:active { transform: scale(0.94); }
  .play-btn svg { width: 34px; height: 34px; fill: #03222f; }

  .play-btn.is-playing {
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 6px rgba(95,227,255,0.12), 0 10px 30px rgba(0,140,200,0.5), 0 0 40px rgba(95,227,255,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(95,227,255,0.05), 0 10px 30px rgba(0,140,200,0.6), 0 0 60px rgba(95,227,255,0.6); }
  }

  .status {
    font-size: 13px;
    color: #6fc8e8;
    min-height: 18px;
    letter-spacing: 0.3px;
  }

  .progress-track {
    width: 100%;
    height: 5px;
    background: rgba(120,220,255,0.12);
    border-radius: 4px;
    margin-top: 18px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2fb6ff, #6ff3d6);
    border-radius: 4px;
    transition: width 0.1s linear;
  }


  .dot-steps {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: -10px 0 26px;
  }
  .dot-step {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(120,220,255,0.25);
  }
  .dot-step.active {
    background: #5fffb0;
    box-shadow: 0 0 8px #5fffb0;
  }
  .footer-tag {
    margin-top: 26px;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(140,200,220,0.55);
  }
</style>
</head>
<body>

  <div class="sonar-wrap">
    <div class="sonar-ring"></div>
    <div class="sonar-ring"></div>
    <div class="sonar-ring"></div>
  </div>

  <div class="card">
    <div class="badge"><span class="dot"></span> Logbook Entry</div>
    <div class="sub-icon">🧭</div>
    <h1>Captain Marina</h1>
    <p class="subtitle">Logbook Entry 6 of 6<br>Tap play to listen to the message.</p>
    <div class="dot-steps"><span class="dot-step"></span><span class="dot-step"></span><span class="dot-step"></span><span class="dot-step"></span><span class="dot-step"></span><span class="dot-step active"></span></div>

    <button class="play-btn" id="playBtn" aria-label="Audio abspielen">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>

    <div class="status" id="status">Ready to receive</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="footer-tag">Deep Sea Mission · Logbook 6/6</div>
  </div>

  <audio id="audio" src="logbook-marina-6.mp3" preload="metadata"></audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const status = document.getElementById('status');
    const progressFill = document.getElementById('progressFill');

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', () => {
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
      playBtn.classList.add('is-playing');
      status.textContent = 'Transmission in progress …';
    });

    audio.addEventListener('pause', () => {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('is-playing');
      if (audio.currentTime > 0 && audio.currentTime < audio.duration) {
        status.textContent = 'Paused';
      }
    });

    audio.addEventListener('ended', () => {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('is-playing');
      status.textContent = 'Transmission complete ✓';
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });

    audio.addEventListener('error', () => {
      status.textContent = 'Audio file not found';
    });

    // Bubbles
    const bubbleCount = 14;
    for (let i = 0; i < bubbleCount; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 6 + Math.random() * 18;
      b.style.width = size + 'px';
      b.style.height = size + 'px';
      b.style.left = Math.random() * 100 + 'vw';
      b.style.animationDuration = (8 + Math.random() * 10) + 's';
      b.style.animationDelay = (Math.random() * 10) + 's';
      document.body.appendChild(b);
    }
  </script>
</body>
</html>
